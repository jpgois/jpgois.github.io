name: Update Publications from ORCID

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch publications and update README
        run: |
          python -c '
          import urllib.request, json, sys
          
          # Busca os 5 trabalhos mais recentes
          url = "https://api.crossref.org/works?filter=orcid:0000-0002-9437-6943&sort=published&order=desc&rows=5"
          headers = {"User-Agent": "Profile-Bot/1.0 (joao.gois@ufabc.edu.br)"}
          req = urllib.request.Request(url, headers=headers)
          
          try:
              data = json.loads(urllib.request.urlopen(req).read())
              pubs = []
              for item in data["message"]["items"]:
                  title = item.get("title", ["Untitled"])[0]
                  link = item.get("URL", "#")
                  
                  # Extrai o ano
                  try:
                      year = item.get("published", {}).get("date-parts", [[None]])[0][0]
                      year = f" ({year})" if year else ""
                  except:
                      year = ""
                      
                  pubs.append(f"- **{title}**{year}<br>[Read article]({link})")
              
              with open("README.md", "r", encoding="utf-8") as f:
                  readme = f.read()
              
              pubs_formatted = "\n\n" + "\n\n".join(pubs) + "\n\n"
              
              # Tática para a interface do chat nao apagar as tags:
              start_tag = "<" + "!--SCHOLAR-LIST:START--" + ">"
              end_tag = "<" + "!--SCHOLAR-LIST:END--" + ">"
              
              # Metodo cirurgico de substituicao
              if start_tag in readme and end_tag in readme:
                  parts = readme.split(start_tag)
                  before_tag = parts[0]
                  after_tag = parts[1].split(end_tag, 1)[1]
                  
                  new_readme = before_tag + start_tag + pubs_formatted + end_tag + after_tag
                  
                  with open("README.md", "w", encoding="utf-8") as f:
                      f.write(new_readme)
                  print("README atualizado com sucesso!")
              else:
                  print("Erro: As tags exatas não foram encontradas no arquivo.")
                  sys.exit(1)
                  
          except Exception as e:
              print(f"Erro no script Python: {e}")
              sys.exit(1)
          '

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add README.md
          git commit -m "Atualiza publicacoes via ORCID" || echo "Nenhuma mudanca para commitar"
          git push
