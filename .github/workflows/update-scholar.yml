name: Update Publications from ORCID

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch publications and update README
        run: |
          python -c '
          import urllib.request, json, re, sys
          
          # URL corrigida: busca trabalhos aplicando um filtro pelo seu ORCID
          url = "https://api.crossref.org/works?filter=orcid:0000-0002-9437-6943&sort=published&order=desc&rows=3"
          
          # Header de identificacao amigavel para a API
          headers = {"User-Agent": "UFABC-Profile-Bot/1.0 (joao.gois@ufabc.edu.br)"}
          req = urllib.request.Request(url, headers=headers)
          
          try:
              data = json.loads(urllib.request.urlopen(req).read())
              pubs = []
              for item in data["message"]["items"]:
                  title = item.get("title", ["Sem título"])[0]
                  link = item.get("URL", "#")
                  
                  # Extrai o ano da publicacao
                  try:
                      year = item.get("published", {}).get("date-parts", [[None]])[0][0]
                      year = f" ({year})" if year else ""
                  except:
                      year = ""
                      
                  pubs.append(f"- **{title}**{year}<br>[Acessar artigo]({link})")
              
              with open("README.md", "r", encoding="utf-8") as f:
                  readme = f.read()
              
              # Prepara o texto
              new_pubs = "\n" + "\n\n".join(pubs) + "\n"
              
              # Busca EXATAMENTE as tags do seu arquivo
              new_readme = re.sub(
                  r"().*?()",
                  f"\\1{new_pubs}\\2",
                  readme,
                  flags=re.DOTALL
              )
              
              if readme == new_readme:
                  print("As tags não foram encontradas no README ou não há alterações.")
              else:
                  with open("README.md", "w", encoding="utf-8") as f:
                      f.write(new_readme)
                  print("README atualizado com sucesso!")
                  
          except Exception as e:
              print(f"Erro no script Python: {e}")
              sys.exit(1)
          '

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add README.md
          git commit -m "Atualiza publicacoes via ORCID" || echo "Nenhuma mudanca para commitar"
          git push
